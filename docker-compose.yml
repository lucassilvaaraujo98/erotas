services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: erotas123
      MYSQL_DATABASE: erotas_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/erotas_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: erotas123
      JWT_SECRET: erotas_secret_key_muito_longa_e_segura_12345
      JWT_EXPIRATION: 86400000
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: